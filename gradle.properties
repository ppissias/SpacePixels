# Edit this file locally in the project root or move the same properties to
# %USERPROFILE%\.gradle\gradle.properties if you prefer a user-level setup.
#
# Keep signing credentials and other machine-specific overrides out of commits.

# Maven Central POM developer metadata.
pomDeveloperId=ppissias
pomDeveloperName=Petros Pissias
pomDeveloperEmail=petrospis@gmail.com
pomDeveloperOrganization=GitHub
pomDeveloperOrganizationUrl=https://github.com/ppissias

# Option A: provide an ASCII-armored private key directly to Gradle.
# Preferred in CI and also works locally.
signingKey=
signingPassword=

# Option B: use the legacy local key-ring configuration instead.
# Leave these empty if you use signingKey/signingPassword above.
signing.keyId=
signing.password=
signing.secretKeyRingFile=
