plugins {
    id 'java'
    id 'application'
    id 'maven-publish'
    id 'signing'
}

def mainLauncherName = 'SpacePixels'
def publicLauncherName = "Start${mainLauncherName}"
def sharedJvmArgs = ["-XX:MaxRAMPercentage=80.0", "-XX:+UseG1GC"]
def batchDetectJvmArgs = sharedJvmArgs + ["-Djava.awt.headless=true"]
def githubRepoUrl = 'https://github.com/ppissias/SpacePixels'
def githubRepoScmUrl = 'https://github.com/ppissias/SpacePixels.git'
def centralArtifactId = 'spacepixels'
def centralStagingRepository = layout.buildDirectory.dir('repos/central-staging')

def inMemorySigningKey = providers.gradleProperty('signingKey')
        .map { it.replace("\\n", "\n") }
        .orNull
def inMemorySigningPassword = providers.gradleProperty('signingPassword').orNull
def hasInMemorySigning = inMemorySigningKey != null && inMemorySigningPassword != null
def hasLegacySigning = findProperty('signing.keyId') != null &&
        findProperty('signing.password') != null &&
        findProperty('signing.secretKeyRingFile') != null
def signingConfigured = hasInMemorySigning || hasLegacySigning
repositories {
    mavenCentral()
}
// Add your group and version here
group = 'eu.startales.spacepixels'
version = '2026.04-05'
description = 'SpacePixels desktop application and Java API for moving and transient object detection in aligned astronomical image sequences.'

base {
    archivesName = centralArtifactId
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

java {
    withJavadocJar()
    withSourcesJar()
}

javadoc {
    options.encoding = 'UTF-8'
    if (options.respondsTo('addBooleanOption')) {
        options.addBooleanOption('html5', true)
        options.addBooleanOption('quiet', true)
    }
    if (options.respondsTo('addStringOption')) {
        options.addStringOption('Xdoclint:none', '-quiet')
    }
}

dependencies {
    implementation 'gov.nasa.gsfc.heasarc:nom-tam-fits:1.21.2'
    implementation 'com.google.code.gson:gson:2.13.2'
    implementation 'com.google.guava:guava:33.5.0-jre'
    implementation 'com.formdev:flatlaf:3.4'
    implementation 'io.github.ppissias.jplatesolve:jplatesolve:1.0.0'
    implementation 'io.github.ppissias.jtransient:jtransient:1.0.0'
    // Use JUnit test framework
    testImplementation 'junit:junit:4.13.2'
}

application {
    mainClass = 'eu.startales.spacepixels.gui.ApplicationWindow'
    applicationName = mainLauncherName

    // Dynamically allocate up to 80% of the host system's total memory at runtime.
    // This applies to both `./gradlew run` and the generated distribution start scripts.
    applicationDefaultJvmArgs = sharedJvmArgs
}

def registerToolStartScripts = { String taskName, String launcherName, String toolMainClass, List<String> launcherJvmArgs ->
    tasks.register(taskName, CreateStartScripts) {
        applicationName = launcherName
        mainClass = toolMainClass
        classpath = files(tasks.named('jar')) + configurations.runtimeClasspath
        defaultJvmOpts = launcherJvmArgs
        outputDir = layout.buildDirectory.dir("generated-scripts/${launcherName}").get().asFile
    }
}

def injectStarsStartScripts = registerToolStartScripts(
        'injectStarsStartScripts',
        'injectStars',
        'eu.startales.spacepixels.tools.ArtificialStarInjector',
        sharedJvmArgs
)

def batchDetectStartScripts = registerToolStartScripts(
        'batchDetectStartScripts',
        'batchDetect',
        'eu.startales.spacepixels.tools.BatchDetectionCli',
        batchDetectJvmArgs
)

def windowsMainWrapper = file("src/launchers/${publicLauncherName}.bat")
def unixMainWrapper = file("src/launchers/${publicLauncherName}")

distributions {
    main {
        contents {
            from(windowsMainWrapper)
            from(unixMainWrapper) {
                filePermissions {
                    user {
                        read = true
                        write = true
                        execute = true
                    }
                    group {
                        read = true
                        execute = true
                    }
                    other {
                        read = true
                        execute = true
                    }
                }
            }
            into('bin') {
                from(injectStarsStartScripts)
                from(batchDetectStartScripts)
            }
        }
    }
}

tasks.register('injectStars', JavaExec) {
    group = 'application'
    description = 'Run the Artificial Star Injector tool. Usage: gradlew injectStars -PinjArgs="<dir> <num> <move> <peak> <fwhm>"'
    mainClass = 'eu.startales.spacepixels.tools.ArtificialStarInjector'
    classpath = sourceSets.main.runtimeClasspath
    jvmArgs = sharedJvmArgs

    if (project.hasProperty('injArgs')) {
        args org.apache.tools.ant.types.Commandline.translateCommandline(project.getProperty('injArgs'))
    }
}

tasks.register('batchDetect', JavaExec) {
    group = 'application'
    description = 'Run the batch detection CLI. Usage: gradlew batchDetect -PbatchArgs="\\"<fits_dir>\\" \\"<config.json>\\" [--auto-tune balanced]"'
    mainClass = 'eu.startales.spacepixels.tools.BatchDetectionCli'
    classpath = sourceSets.main.runtimeClasspath
    jvmArgs = batchDetectJvmArgs

    if (project.hasProperty('batchArgs')) {
        args org.apache.tools.ant.types.Commandline.translateCommandline(project.getProperty('batchArgs'))
    }
}

tasks.register('realDataTest', JavaExec) {
    group = 'verification'
    description = 'Run opt-in real-data integration tests against local datasets outside the repository.'
    dependsOn tasks.named('testClasses')
    mainClass = 'eu.startales.spacepixels.tools.SpacePixelsRealDataMain'
    classpath = sourceSets.test.runtimeClasspath
    jvmArgs = batchDetectJvmArgs
    systemProperty 'spacepixels.testdata.root', 'C:/Users/petro/Documents/astro-data/tests'
    shouldRunAfter tasks.named('test')
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            artifactId = centralArtifactId

            versionMapping {
                usage('java-api') {
                    fromResolutionOf('runtimeClasspath')
                }
                usage('java-runtime') {
                    fromResolutionResult()
                }
            }

            pom {
                name = 'SpacePixels'
                description = project.description
                url = githubRepoUrl

                licenses {
                    license {
                        name = 'BSD 2-Clause License'
                        url = 'https://opensource.org/license/bsd-2-clause/'
                        distribution = 'repo'
                    }
                }

                developers {
                    developer {
                        id = providers.gradleProperty('pomDeveloperId')
                        name = providers.gradleProperty('pomDeveloperName')
                        email = providers.gradleProperty('pomDeveloperEmail')
                        organization = providers.gradleProperty('pomDeveloperOrganization')
                        organizationUrl = providers.gradleProperty('pomDeveloperOrganizationUrl')
                    }
                }

                scm {
                    connection = "scm:git:${githubRepoScmUrl}"
                    developerConnection = 'scm:git:ssh://git@github.com/ppissias/SpacePixels.git'
                    url = githubRepoUrl
                }
            }
        }
    }

    repositories {
        maven {
            name = 'centralStaging'
            url = centralStagingRepository
        }
    }
}

tasks.register('validateCentralReleaseConfiguration') {
    group = 'publishing'
    description = 'Checks that signing credentials are configured for Maven Central bundle generation.'

    doLast {
        if (!signingConfigured) {
            throw new GradleException(
                    'Central bundle generation requires signing credentials. ' +
                            'Set ORG_GRADLE_PROJECT_signingKey and ORG_GRADLE_PROJECT_signingPassword, ' +
                            'or configure signing.keyId/signing.password/signing.secretKeyRingFile.')
        }
        
        def checkNotBlank = { String propName ->
            def prop = providers.gradleProperty(propName).orNull
            if (prop == null || prop.trim().isEmpty()) {
                throw new GradleException("Missing required Gradle property for publication: '${propName}'.")
            }
        }
        checkNotBlank('pomDeveloperId')
        checkNotBlank('pomDeveloperName')
        checkNotBlank('pomDeveloperEmail')
        checkNotBlank('pomDeveloperOrganization')
        checkNotBlank('pomDeveloperOrganizationUrl')
    }
}

signing {
    if (hasInMemorySigning) {
        useInMemoryPgpKeys(inMemorySigningKey, inMemorySigningPassword)
    }

    if (signingConfigured) {
        sign publishing.publications.mavenJava
    }
}

tasks.withType(Sign).configureEach {
    onlyIf('Central staging publication requested') {
        gradle.taskGraph.allTasks.any { task ->
            task.name == 'publishMavenJavaPublicationToCentralStagingRepository' ||
                    task.name == 'publishAllPublicationsToCentralStagingRepository' ||
                    task.name == 'bundleCentralPortal'
        }
    }
}

tasks.named('publishMavenJavaPublicationToCentralStagingRepository') {
    dependsOn tasks.named('validateCentralReleaseConfiguration')
}

tasks.register('bundleCentralPortal', Zip) {
    description = 'Builds a Maven Central Portal upload bundle from the signed staged Maven repository.'
    group = 'publishing'
    dependsOn tasks.named('check')
    dependsOn tasks.named('publishMavenJavaPublicationToCentralStagingRepository')
    from centralStagingRepository
    destinationDirectory = layout.buildDirectory.dir('distributions')
    archiveFileName = "${centralArtifactId}-${project.version}-central-bundle.zip"
}

tasks.register('mavenCentralBundle') {
    description = 'Standard alias for bundleCentralPortal to keep release commands consistent across repositories.'
    group = 'publishing'
    dependsOn tasks.named('bundleCentralPortal')
}
