plugins {
    id 'java'
    id 'application'
}

repositories {
    mavenCentral()
}
// Add your group and version here
group = 'eu.startales.spacepixels'
version = '2026.03-beta4'

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

java {
    withJavadocJar()
}

dependencies {
    implementation 'gov.nasa.gsfc.heasarc:nom-tam-fits:1.21.2'
    implementation 'org.apache.commons:commons-configuration2:2.13.0'
    implementation 'commons-beanutils:commons-beanutils:1.11.0'
    implementation 'com.google.code.gson:gson:2.13.2'
    implementation 'com.google.guava:guava:33.5.0-jre'
    implementation 'com.formdev:flatlaf:3.4'
    implementation fileTree(dir: 'lib', include: '*.jar')
    // Use JUnit test framework
    testImplementation 'junit:junit:4.13.2'
}

application {
    mainClass = 'eu.startales.spacepixels.gui.ApplicationWindow'
    applicationName = 'SpacePixels'
}
